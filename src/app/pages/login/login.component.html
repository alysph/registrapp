<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
      <ion-title>
        Inicio de sesión
      </ion-title>
  </ion-toolbar>
</ion-header>
<ion-content class="background">
<ion-card>
  <img src="/assets/Registrapp.png" class="ion-padding">
</ion-card>
  <ion-item>
    <ion-label>Correo:</ion-label>
    <ion-input type="text" placeholder="Correo Institucional" value="" class="forms-control" [(ngModel)] = "credenciales.correo"></ion-input>
  </ion-item>
  <ion-item>
    <ion-label>Contraseña:</ion-label>
    <ion-input class="forms-control" type="password" placeholder="Contraseña" [(ngModel)]="credenciales.password"></ion-input>
  </ion-item>
  <br>
<ion-button expand="full" color="success" (click)="login()">
  Iniciar sesión
</ion-button>
<ion-button expand="full" color="secondary" [routerLink]="['/registro']">
  Registro
</ion-button>
</ion-content>
