<ion-toolbar>
  <ion-buttons slot="start">
    <ion-menu-button></ion-menu-button>
  </ion-buttons>
  <ion-title>
    Asistencia
  </ion-title>
</ion-toolbar>

<ion-content class="background">
  <ion-card class="ion-text-center">
    <ion-card-content>
      <qrcode
      [qrdata]="qrCodeString"
      [width]="256"
      [errorCorrectionLevel]="'M'">
    </qrcode>
    </ion-card-content>
  </ion-card>

  <ion-item *ngIf="scannedResult">
    <ion-label class="ion-text-wrap">Resultado de escáner: {{scannedResult}}</ion-label>
  </ion-item>
</ion-content>
