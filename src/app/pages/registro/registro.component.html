<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
      <ion-title>
       Registro
      </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="background">
<ion-card>
  <img src="/assets/Rep.png" class="ion-padding">
</ion-card>
<br>
  <ion-label style="padding-left: 10px; color: black; align-items: center;">Registrate para usar la aplicación</ion-label>
  <br>
  <br>
<ion-item>
  <ion-label>Nombre:</ion-label>
  <ion-input placeholder="Nombre"  [(ngModel)]="datos.nombre"></ion-input>
</ion-item>
<ion-item>
  <ion-label>Apellido:</ion-label>
  <ion-input placeholder="Apellido"  [(ngModel)]="datos.apellido"></ion-input>
</ion-item>

  <ion-item>
    <ion-label>Correo:</ion-label>
    <ion-input type="text" placeholder="Correo Institucional"  [(ngModel)]="datos.correo"></ion-input>
  </ion-item>
  
  <ion-item>
    <ion-label>Contraseña:</ion-label>
    <ion-input type="password" placeholder="Password" [(ngModel)]="datos.password"></ion-input>
  </ion-item>
  <br>
<ion-button expand="full" color="secondary" (click)="registrar()">
  Registrarme
</ion-button>


<ion-button expand="full" color="success" [routerLink]="['/login']" routerLinkActive="router-link-active" >
  O iniciar sesión
</ion-button>
</ion-content>
